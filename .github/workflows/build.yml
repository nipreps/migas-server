name: Build and test service

on:
  push:
    branches:
    - main
    tags:
    - '*'
  pull_request: {}
  schedule:
  # 7am EST / 8am EDT Mondays
  - cron: '0 12 * * 1'
  workflow_dispatch:
    inputs:
      test-network:
        description: 'Run integration tests with real network traffic'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        deps: [locked, latest]
        include:
        - deps: locked
          buildtype: test
        - deps: latest
          buildtype: test-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@v7
    - name: Cache geolocation databases
      id: cache-geoloc
      uses: actions/cache@v5
      with:
        path: |
          asn.mmdb
          city.mmdb
        key: geoloc-${{ runner.os }}-${{ hashFiles('migas/server/constants.py') }}
    - name: Download geolocation databases
      if: steps.cache-geoloc.outputs.cache-hit != 'true'
      run: |
        ASN_URL=$(grep "LOC_ASN_URL =" migas/server/constants.py | cut -d"'" -f2)
        CITY_URL=$(grep "LOC_CITY_URL =" migas/server/constants.py | cut -d"'" -f2)
        curl -L -o asn.mmdb.gz "$ASN_URL"
        curl -L -o city.mmdb.gz "$CITY_URL"
        gunzip -f asn.mmdb.gz
        gunzip -f city.mmdb.gz
    - name: Build the image (${{ matrix.deps }} deps)
      run: |
        VERSION=$(uvx --with hatch-vcs hatch version | tail -n1)
        echo $VERSION
        docker compose build --build-arg BUILDTYPE=${{ matrix.buildtype }} --build-arg DEPLOYSERVER=uvicorn --build-arg VERSION=$VERSION
    - name: Start all the things
      run: docker compose up -d --wait
      env:
        MIGAS_GEOLOC: 1
    - name: Test the things
      run: |
        PYTEST_ARGS="--cov=migas --cov-report=xml:/tmp/coverage.xml"
        if [[ "${{ github.ref_type }}" != "tag" ]] && [[ "${{ github.event_name }}" != "schedule" ]] && [[ "${{ github.event.inputs.test-network }}" != "true" ]]; then
          PYTEST_ARGS="$PYTEST_ARGS -m 'not network'"
        fi
        docker exec -e COVERAGE_FILE=/tmp/.coverage app bash -c "pytest $PYTEST_ARGS /src/migas/server"
    - name: Extract coverage report
      run: docker cp app:/tmp/coverage.xml .
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: true
    - name: Stop all the things
      run: docker compose down
