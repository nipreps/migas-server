<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Migas | Telemetry Server{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/viz.css">
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
      <div class="footer-content">
        <span>© 2026 Nipreps Developers</span>
        <span>•</span>
        <span>Apache License 2.0</span>
        <span>•</span>
        <span class="version-tag">v{{ version }}</span>
        <span>•</span>
        <a href="https://github.com/nipreps/migas-server" class="github-link">GitHub</a>
      </div>
    </footer>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
